<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>邮箱确认成功 - 文枢</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="邮箱确认成功，请返回文枢插件登录。">
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: rgba(15, 23, 42, 0.84);
      --border: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #a7b3c4;
      --green: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 22% 12%, rgba(47, 107, 255, 0.34), transparent 34%),
        radial-gradient(circle at 78% 88%, rgba(34, 197, 94, 0.18), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .card {
      width: min(100%, 520px);
      padding: 42px 34px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      text-align: center;
      backdrop-filter: blur(18px);
    }

    .mark {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
      border-radius: 24px;
      background: rgba(34, 197, 94, 0.12);
      color: var(--green);
      font-size: 46px;
      font-weight: 800;
      border: 1px solid rgba(34, 197, 94, 0.28);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 6vw, 38px);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }

    button {
      margin-top: 30px;
      min-height: 44px;
      padding: 0 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark" aria-hidden="true">✓</div>
    <h1>邮箱确认成功</h1>
    <p>请返回文枢插件登录。你有 1 小时试用时间，结束后可选择合适的套餐。</p>
    <button type="button" onclick="window.close()">关闭页面</button>
  </main>
</body>
</html>
